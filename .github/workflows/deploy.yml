name: Collecte & publication

# Quand ça tourne :
on:
  schedule:
    - cron: "0 5 * * *"     # chaque jour ~7h (heure de Paris)
  push:
    branches: [main]        # à chaque mise à jour du code
  workflow_dispatch: {}     # + un bouton "Run workflow" manuel dans l'onglet Actions

permissions:
  contents: write   # committer les données rafraîchies
  pages: write      # publier sur GitHub Pages
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      # Aucune dépendance ni clé d'API : la collecte ne s'appuie que sur Node et
      # ses modules natifs. Pas d'étape d'installation.
      - name: Collecte des compétitions
        run: node scripts/collect.mjs

      - name: Committer les données rafraîchies
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/competitions.json site/data.js
          git commit -m "Données : rafraîchissement automatique" || echo "Rien de neuf à committer"
          git push || echo "Rien à pousser"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site          # on publie le contenu du dossier site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
