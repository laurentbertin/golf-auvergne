name: Digest bimensuel (brouillon)

# Prépare la campagne, pour un envoi relu et déclenché à la main.
# Programmé tous les jeudis, mais le script ne produit un numéro qu'une semaine
# sur deux : cron ne sait pas exprimer « tous les 15 jours » sans dériver dans
# le mois. Un déclenchement manuel produit toujours un brouillon.
on:
  schedule:
    - cron: "0 6 * * 4"   # jeudi ~8h heure de Paris
  workflow_dispatch: {}   # bouton « Run workflow » pour le déclencher à la demande

permissions:
  contents: read

jobs:
  brouillon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      # Les données du dépôt datent de la collecte du matin ; on les rafraîchit
      # pour que le digest reflète l'état du jour, sans rien committer.
      - name: Rafraîchir les compétitions
        run: node scripts/collect.mjs

      - name: Déposer le brouillon dans Brevo
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          DECLENCHEMENT: ${{ github.event_name }}
        run: node scripts/campagne.mjs
